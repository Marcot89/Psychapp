name: psychapp
description: "Aplicativo de gestão para psicólogos — agenda de sessões e controle financeiro."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Gerenciamento de estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Banco de dados local (SQLite type-safe)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Navegação
  go_router: ^13.2.0

  # Google OAuth + Calendar
  google_sign_in: ^6.2.1
  googleapis: ^12.0.0
  http: ^1.2.1

  # Notificações locais
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # Gráficos
  fl_chart: ^0.68.0

  # Utilitários
  uuid: ^4.4.0
  intl: ^0.19.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation (Drift + Riverpod)
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0

  # Linting
  flutter_lints: ^3.0.0

  # Mocking para testes
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
