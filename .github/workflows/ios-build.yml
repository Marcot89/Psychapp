name: iOS Build

on:
  push:
    branches: [master]
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  build-ios:
    name: Build iOS (no codesign)
    runs-on: macos-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Verificar código (analyze)
        run: flutter analyze

      - name: Rodar testes
        run: flutter test

      - name: Build iOS (sem assinatura)
        run: flutter build ios --release --no-codesign

      - name: Gerar .ipa para Sideloadly
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r psychapp.ipa Payload
          rm -rf Payload

      - name: Upload artefato iOS (.ipa)
        uses: actions/upload-artifact@v4
        with:
          name: psychapp-ios
          path: psychapp.ipa
          retention-days: 7
